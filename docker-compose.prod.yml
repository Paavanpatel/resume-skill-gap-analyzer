# ==============================================================
# Resume Skill Gap Analyzer - Docker Compose (Production)
#
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#   docker compose -f docker-compose.prod.yml --env-file .env.production logs -f
#   docker compose -f docker-compose.prod.yml --env-file .env.production down
#
# Prerequisites:
#   1. Copy .env.production.example to .env.production and fill in values
#   2. Place TLS certs in infrastructure/nginx/ssl/
#   3. Start Docker Desktop
#   4. Run the command above
# ==============================================================

services:
  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rsga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-skill_gap_analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    networks:
      - backend-net

  # ── Redis (Cache + Queue + Sessions) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: rsga-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
    networks:
      - backend-net

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: rsga-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - APP_ENV=production
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - backend-net
      - frontend-net

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: rsga-worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - APP_ENV=production
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      --without-heartbeat
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    networks:
      - backend-net

  # ── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
        - NEXT_PUBLIC_WS_URL=/ws
    container_name: rsga-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - frontend-net

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rsga-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - frontend-net
      - backend-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
