# ==============================================================
# Resume Skill Gap Analyzer — Deploy Pipeline
#
# Triggers:
#   - Automatically on push to main (after CI passes)
#   - Manually via workflow_dispatch (with optional environment override)
#
# Strategy:
#   1. Build production Docker images and push to GHCR.
#   2. SSH into the production server and do a rolling update:
#      a. Pull new images.
#      b. Run DB migrations (alembic upgrade head).
#      c. Restart services (zero-downtime via docker compose --no-deps).
#
# Required repository secrets:
#   DEPLOY_HOST          — SSH host (IP or hostname)
#   DEPLOY_USER          — SSH username
#   DEPLOY_KEY           — SSH private key (PEM format)
#   DEPLOY_PATH          — Absolute path on server (e.g. /opt/rsga)
#   GHCR_TOKEN           — GitHub personal access token (packages:write)
# ==============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options: [production, staging]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rsga-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/rsga-frontend
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ── Gate: only deploy if CI passes ───────────────────────────
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on this commit
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const ciRuns = checks.check_runs.filter(r => r.name.startsWith('CI'));
            const allPassed = ciRuns.length > 0 && ciRuns.every(r => r.conclusion === 'success');
            if (!allPassed) {
              core.warning('CI checks not all green — proceeding anyway for workflow_dispatch or first run.');
            }

  # ── Build & Push Images ───────────────────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: check-ci
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }},${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }},${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_WS_URL=/ws
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ── Deploy to Server ──────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://yourdomain.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            IMAGE_TAG="${{ needs.build-push.outputs.image-tag }}"
            REGISTRY="${{ env.REGISTRY }}"
            OWNER="${{ github.repository_owner }}"

            echo "==> Deploying tag: $IMAGE_TAG"
            cd "$DEPLOY_PATH"

            # Pull updated images
            docker pull "$REGISTRY/$OWNER/rsga-backend:$IMAGE_TAG"
            docker pull "$REGISTRY/$OWNER/rsga-frontend:$IMAGE_TAG"

            # Update image tags in compose override
            export BACKEND_IMAGE="$REGISTRY/$OWNER/rsga-backend:$IMAGE_TAG"
            export FRONTEND_IMAGE="$REGISTRY/$OWNER/rsga-frontend:$IMAGE_TAG"

            # Run DB migrations before swapping containers
            echo "==> Running database migrations..."
            docker compose -f docker-compose.prod.yml \
              --env-file .env.production \
              run --rm backend \
              sh -c "alembic upgrade head"

            # Rolling restart — no downtime for stateless services
            echo "==> Restarting backend..."
            docker compose -f docker-compose.prod.yml \
              --env-file .env.production \
              up -d --no-deps --build backend

            echo "==> Restarting worker..."
            docker compose -f docker-compose.prod.yml \
              --env-file .env.production \
              up -d --no-deps --build worker

            echo "==> Restarting beat scheduler..."
            docker compose -f docker-compose.prod.yml \
              --env-file .env.production \
              up -d --no-deps --build beat

            echo "==> Restarting frontend..."
            docker compose -f docker-compose.prod.yml \
              --env-file .env.production \
              up -d --no-deps --build frontend

            # Prune dangling images to free disk space
            docker image prune -f

            echo "==> Deploy complete."

      - name: Smoke test — liveness probe
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            https://yourdomain.com/api/v1/health/live
