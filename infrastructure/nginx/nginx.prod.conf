# ==============================================================
# Nginx Production Configuration
# Reverse proxy for backend API + frontend, with:
#   - TLS termination (cert paths configurable)
#   - Gzip compression
#   - Security headers
#   - Static asset caching
#   - Rate limiting
#   - WebSocket support
#   - Request size limits
# ==============================================================

# ── Rate limiting zones ───────────────────────────────────────
# 10 req/s per IP for general traffic, burst allows short spikes
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# 1 req/s for analysis submissions (expensive operations)
limit_req_zone $binary_remote_addr zone=analysis:10m rate=1r/s;

# ── DNS resolver ──────────────────────────────────────────────
# Use Docker's embedded DNS so nginx re-resolves container IPs
# after restarts instead of caching the address forever.
# Variable-based proxy_pass below is required to activate this.
resolver 127.0.0.11 valid=30s ipv6=off;

# ── Redirect HTTP to HTTPS ────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow health checks over HTTP (for load balancers)
    location /api/v1/health {
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
    }

    # Everything else redirects to HTTPS
    # location / {
    #     return 301 https://$host$request_uri;
    # }
    location / {
        set $frontend_url http://frontend:3000;
        proxy_pass $frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
    }

}

# ── Main HTTPS server block ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # ── TLS Configuration ─────────────────────────────────────
    # Replace these paths with your actual cert/key locations.
    # For Let's Encrypt:  /etc/letsencrypt/live/yourdomain.com/
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS settings (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Request Limits ────────────────────────────────────────
    client_max_body_size 10M;

    # ── Backend API ───────────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Timeouts for long-running analysis requests
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # ── Analysis submission (stricter rate limit) ─────────────
    location ~ ^/api/v1/analysis/[^/]+/submit {
        limit_req zone=analysis burst=5 nodelay;

        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        proxy_read_timeout 120s;
    }

    # ── WebSocket for real-time updates ───────────────────────
    location /ws/ {
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket connections can be long-lived
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (no rate limit) ──────────────────────────
    location = /api/v1/health {
        set $backend_url http://backend:8000;
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Static assets (Next.js _next/static — immutable cache) ─
    location /_next/static/ {
        set $frontend_url http://frontend:3000;
        proxy_pass $frontend_url;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Frontend (everything else) ────────────────────────────
    location / {
        limit_req zone=general burst=30 nodelay;

        set $frontend_url http://frontend:3000;
        proxy_pass $frontend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Error pages ───────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
